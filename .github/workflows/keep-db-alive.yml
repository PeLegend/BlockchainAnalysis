name: Keep Neo4j Database Alive

on:
  schedule:
    # รันทุกๆ 2 วันตอนเที่ยงคืน (00:00 UTC) เพื่อป้องกัน database หยุดทำงาน (AuraDB ฟรีจะหยุดถ้าไม่มี activity 3 วัน)
    - cron: '0 0 */2 * *'
  workflow_dispatch: # อนุญาตให้กดรันแบบ manual ได้จากหน้าเว็บ GitHub Actions

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install neo4j-driver
        run: npm install neo4j-driver

      - name: Ping Neo4j
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: |
          node -e "
            const neo4j = require('neo4j-driver');
            
            if (!process.env.NEO4J_URI || !process.env.NEO4J_PASSWORD) {
              console.error('❌ Missing NEO4J_URI or NEO4J_PASSWORD in GitHub Secrets!');
              process.exit(1);
            }

            const driver = neo4j.driver(
              process.env.NEO4J_URI,
              neo4j.auth.basic(process.env.NEO4J_USER || 'neo4j', process.env.NEO4J_PASSWORD)
            );
            
            async function ping() {
              const session = driver.session();
              try {
                const result = await session.run('RETURN 1 AS alive');
                console.log('✅ Database pinged successfully! Result:', result.records[0].get('alive').toNumber() === 1);
              } catch (err) {
                console.error('❌ Error pinging database:', err.message);
                process.exit(1);
              } finally {
                await session.close();
                await driver.close();
              }
            }
            
            ping();
          "
